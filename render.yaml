# Render Blueprint — Socket.IO server (alternative to Railway).
# In Render: New → Blueprint → point at this repo.
services:
  - type: web
    name: wordspy-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /health
    envVars:
      - key: WEB_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://wordspy.vercel.app
